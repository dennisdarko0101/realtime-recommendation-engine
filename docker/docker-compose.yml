name: realtime-recommendation-engine

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    ports:
      # Host 8220 -> container 8000. Distinct from llm-guardrails-safety (8100)
      # and ml-monitoring-dashboard (8210) so the stacks do not collide.
      - "8220:8000"
    environment:
      - REC_REDIS_URL=redis://redis:6379/0
      - REC_DEBUG=false
      - REC_SEED_DEMO_DATA=true
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port published: the app reaches Redis on the internal network, and
    # publishing 6379 would collide with other local Redis containers.
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  api-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    ports:
      - "8221:8000"
    environment:
      - REC_DEBUG=true
    volumes:
      - ..:/app
    profiles:
      - dev

volumes:
  redis_data:
